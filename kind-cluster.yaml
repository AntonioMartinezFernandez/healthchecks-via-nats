kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devicemonitor
nodes:
- role: control-plane
  extraMounts:
  - hostPath: /var/run/docker.sock
    containerPath: /var/run/docker.sock
  extraPortMappings:
  - containerPort: 30000   
    hostPort: 30000
    protocol: TCP
  - containerPort: 30311
    hostPort: 30311
    protocol: TCP
- role: worker
- role: worker
networking:
  ipFamily: ipv4
